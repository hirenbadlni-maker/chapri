<html>
<head>
<meta charset="UTF-8">
<title>Birthday Present</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
    font-family:Arial, sans-serif;
}

/* Curtains */
.curtain{
    position:fixed;
    top:0;
    width:50%;
    height:100%;
    background:#b30000;
    z-index:100;
    transition:transform 2s ease;
}

.left{
    left:0;
}

.right{
    right:0;
}

.open .left{
    transform:translateX(-100%);
}

.open .right{
    transform:translateX(100%);
}

/* Content */
.content{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.gift{
    font-size:120px;
    cursor:pointer;
    transition:0.4s;
}

.gift:hover{
    transform:scale(1.2);
}

h1{
    font-size:45px;
}

p{
    font-size:22px;
}
</style>
</head>

<body>

<div class="curtain left"></div>
<div class="curtain right"></div>

<div class="content">
    <h1>🎂 This is your Birthday Present! 🎂</h1>
    <p>Click the gift to open it.</p>

    <div class="gift" onclick="openGift()">
        🎁
    </div>
</div>

<script>
// Open curtains after 1 second
setTimeout(() => {
    document.body.classList.add("open");
}, 1000);

function openGift(){
    document.body.innerHTML = `
        <video width="100%" height="100%" autoplay controls>
            <source src="prank.mp4" type="video/mp4">
        </video>
    `;
}
</script>

</body>
</html>
